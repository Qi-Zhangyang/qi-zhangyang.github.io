   ${opts?`<div class="opts">${opts}</div>`:''}

   ${r.error?`<div class="err">${esc(r.error)}</div>`:''}
  </div>
 </article>`;
}
function render(){
 const q=search.value.toLowerCase();
 const b=branch.value, st=status.value;
 let rows=DATA.filter(r=>(!b||r.branch===b)&&(!st||(st==='ok'?r.ok:!r.ok))&&(`${r.cell} ${r.title} ${r.path} ${r.idea||''} ${r.plan_scene||''} ${r.plan_question||''} ${r.question||''}`.toLowerCase().includes(q)));
 document.getElementById('count').textContent=rows.length;
 grid.innerHTML=rows.map(card).join('');
}
search.oninput=render; branch.onchange=render; status.onchange=render; render();
</script>
