<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geo-KG Planner Tabs</title>
<style>
body{margin:0;font:14px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f7f9;color:#17202a}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #d9dde3;padding:12px 16px}
h1{font-size:18px;margin:0 0 8px}
.sub{color:#526173;margin-bottom:10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
button{height:36px;border:1px solid #c8ced7;border-radius:7px;background:#fff;color:#263445;padding:0 12px;font-weight:650;cursor:pointer}
button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
iframe{display:block;width:100%;height:calc(100vh - 104px);border:0;background:#fff}
</style>
<header>
  <h1>Geo-KG Planner Compare · Plan-first View</h1>
  <div class="sub">立体几何 QA 生成路线对比页：优先看同一批 5 个 cell × 20 题的同口径结果；大样本/不同 cell 结果只作展示，不直接横向比较分数。</div>
  <nav class="tabs">
    <button class="active" data-src="v27-k26-strict-same5-20.html?v=2bd8e61">V2.7 K26 Strict · Same5×20 · 93/100</button>
    <button data-src="v26-1-planned-options.html">V2.6.1 Planned Options</button>
    <button data-src="v26-richbrief-k26.html">V2.6 Fable Rich Brief → K26 Plan</button>
    <button data-src="v25-brief-k26.html">V2.5 Fable Brief → K26 Plan</button>
    <button data-src="fable-full-plan.html">V2.4 Fable Full Plan</button>
    <button data-src="k26-only-plan.html">V2.4 K26 Only Plan</button>
    <button data-src="v28-fable-medium-10x20.html">V2.8 Fable Medium · 10×20 · diff cells</button>
  </nav>
</header>
<iframe id="frame" src="v27-k26-strict-same5-20.html?v=2bd8e61"></iframe>
<script>
const frame=document.getElementById('frame');
for(const btn of document.querySelectorAll('button[data-src]')){
  btn.onclick=()=>{
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    frame.src=btn.dataset.src;
  };
}
</script>
