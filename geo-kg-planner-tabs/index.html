<iframe id="frame" src="v28-repair2-gpt55.html?v=gpt55-repair2-viz2"></iframe>
<script>
const frame=document.getElementById('frame');
function collapseNav(){document.body.classList.add('compact');}
function expandNav(){document.body.classList.remove('compact');}
function bindFrameScroll(){
  try{
    const w=frame.contentWindow;
    w.addEventListener('scroll',()=>{
      if(w.scrollY>24) collapseNav();
      else expandNav();
    },{passive:true});
  }catch(e){}
}
for(const btn of document.querySelectorAll('button[data-src]')){
  btn.onclick=()=>{
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    frame.src=btn.dataset.src;
    setTimeout(collapseNav,160);
  };
}
frame.addEventListener('load',bindFrameScroll);
</script>
