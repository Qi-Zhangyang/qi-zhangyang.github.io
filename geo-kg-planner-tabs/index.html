<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geo-KG Planner Tabs</title>
<style>
body{margin:0;font:14px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f7f9;color:#17202a}
header{background:#fff;border-bottom:1px solid #d9dde3;padding:12px 16px}
h1{font-size:18px;margin:0 0 8px}
.sub{color:#526173;margin-bottom:10px}
.sectionlabel{font-size:12px;font-weight:750;color:#64748b;margin:8px 0 5px;text-transform:uppercase}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
button{height:36px;border:1px solid #c8ced7;border-radius:7px;background:#fff;color:#263445;padding:0 12px;font-weight:650;cursor:pointer}
button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
button.archive{border-style:dashed;color:#64748b}
iframe{display:block;width:100%;height:calc(100vh - 148px);border:0;background:#fff}
#showNav{display:none;position:fixed;right:12px;top:10px;z-index:20;height:32px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.16)}
body.compact header{display:none}
body.compact iframe{height:100vh}
body.compact #showNav{display:block}
</style>
<header>
  <h1>Geo-KG Planner Compare · Plan-first View</h1>
  <div class="sub">立体几何 QA 生成路线对比页：同一批 5 个 cell × 20 题的同口径结果；上层保留主线候选，下层保留已淘汰路线证据。</div>
  <div class="sectionlabel">主线候选</div>
  <nav class="tabs">
    <button data-src="v28-repair1.html?v=repair1-label1">V2.8-R1 Repair1 · R1 76/100</button>
    <button class="active" data-src="v28-free-review.html?v=main-hd-label1">V2.8-R1 Free Generate → Review · 100/100</button>
    <button data-src="v27-k26-strict-same5-20.html?v=main-hd-label1">V2.7 K26 Strict · Same5×20 · 93/100</button>
    <button data-src="fable-full-plan.html?v=main-hd-label1">V2.4 Fable Full Plan</button>
    <button data-src="k26-only-plan.html?v=main-hd-label1">V2.4 K26 Only Plan</button>
  </nav>
  <div class="sectionlabel">下层归档 / 已淘汰：Brief → K26 展开路线</div>
  <nav class="tabs">
    <button class="archive" data-src="v26-1-planned-options.html?v=cellsort1">V2.6.1 Planned Options</button>
    <button class="archive" data-src="v26-richbrief-k26.html?v=cellsort1">V2.6 Fable Rich Brief → K26 Plan</button>
    <button class="archive" data-src="v25-brief-k26.html?v=cellsort1">V2.5 Fable Brief → K26 Plan</button>
  </nav>
  <div class="sectionlabel">Review Reports</div>
  <nav class="tabs">
    <button class="archive" data-src="v28-alignment-review-after-repair1.html?v=repair1-failcards1">V2.8 R1 Alignment After Repair1 · Failed 24</button>
    <button class="archive" data-src="v28-alignment-review.html?v=r1-failcards1">V2.8 R1 Alignment Review · Failed 33</button>
  </nav>
</header>
<button id="showNav">显示标签</button>
<iframe id="frame" src="v28-free-review.html?v=main-hd-label1"></iframe>
<script>
const frame=document.getElementById('frame');
const showNav=document.getElementById('showNav');
function collapseNav(){document.body.classList.add('compact');}
function expandNav(){document.body.classList.remove('compact'); window.scrollTo({top:0,behavior:'smooth'});}
function bindFrameScroll(){
  try{
    const w=frame.contentWindow;
    w.addEventListener('scroll',()=>{ if(w.scrollY>24) collapseNav(); },{passive:true});
  }catch(e){}
}
showNav.onclick=expandNav;
for(const btn of document.querySelectorAll('button[data-src]')){
  btn.onclick=()=>{
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    frame.src=btn.dataset.src;
    setTimeout(collapseNav,160);
  };
}
frame.addEventListener('load',bindFrameScroll);
</script>
