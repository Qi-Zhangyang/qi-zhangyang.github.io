<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geo-KG Planner Tabs</title>
<style>
body{margin:0;font:14px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f7f9;color:#17202a}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #d9dde3;padding:12px 16px}
h1{font-size:18px;margin:0 0 8px}
.sub{color:#526173;margin-bottom:10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
button{height:36px;border:1px solid #c8ced7;border-radius:7px;background:#fff;color:#263445;padding:0 12px;font-weight:650;cursor:pointer}
button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
iframe{display:block;width:100%;height:calc(100vh - 104px);border:0;background:#fff}
</style>
<header>
  <h1>Geo-KG Planner Compare · Plan-first View</h1>
  <div class="sub">同一批 5 个立体几何 cell × 20 题，对比三种“想题/规划”路线；每张卡片先展示构想/plan，再展示图和 QA。</div>
  <nav class="tabs">
    <button class="active" data-src="v25-brief-k26.html">V2.5 Fable Brief → K26 Plan</button>
    <button data-src="fable-full-plan.html">Fable Full Plan</button>
    <button data-src="k26-only-plan.html">K26 Only Plan</button>
  </nav>
</header>
<iframe id="frame" src="v25-brief-k26.html"></iframe>
<script>
const frame=document.getElementById('frame');
for(const btn of document.querySelectorAll('button[data-src]')){
  btn.onclick=()=>{
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    frame.src=btn.dataset.src;
  };
}
</script>
