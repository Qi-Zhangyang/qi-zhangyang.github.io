const grid = document.getElementById('grid');
const search = document.getElementById('search');
const branch = document.getElementById('branch');
const status = document.getElementById('status');
function esc(s){return String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function list(xs){return Array.isArray(xs)?xs.filter(Boolean).map(x=>`<span class="chip">${esc(x)}</span>`).join(''):''}
function card(r){
 const opts = Object.entries(r.options||{}).map(([k,v])=>`${esc(k)}. ${esc(v)}`).join('<br>');
 const plannedWrong = (r.planned_options && Array.isArray(r.planned_options.wrong)) ? r.planned_options.wrong : r.plan_distractors;
 const distractors = list(plannedWrong);
 const must = list(r.plan_must_render);
 return `<article class="card">
  <div class="imgwrap">${r.image?`<img src="${r.image}">`:'<span class="noimg">No preview</span>'}</div>
  <div class="body">
   <div class="meta"><span class="badge ${r.ok?'ok':'bad'}">${r.ok?'PASS':'FAIL'}</span><span class="badge">${esc(r.branch)}</span><span class="badge">${esc(r.secs)}s</span></div>
   <div class="cid">${esc(r.cell)}</div><div class="title">${esc(r.title)}</div><div class="path" title="${esc(r.path)}">${esc(r.path)}</div>
   ${r.idea?`<div class="idea"><div class="blocktitle">Fable 一句话构想</div>${esc(r.idea)}</div>`:''}
   ${r.plan_scene?`<details class="plan" open><summary>${esc(r.plan_label || 'Plan')}</summary>
     <div class="planrow"><b>Scene：</b>${esc(r.plan_scene)}</div>
     <div class="planrow"><b>Question：</b>${esc(r.plan_question)}</div>
     <div class="planrow"><b>Answer：</b>${esc(r.plan_answer)}</div>
     ${r.planned_options&&r.planned_options.correct?`<div class="planrow"><b>Planned options：</b><div class="chips"><span class="chip">✓ ${esc(r.planned_options.correct)}</span>${list(r.planned_options.wrong||[])}</div></div>`:''}
     <div class="planrow"><b>Why：</b>${esc(r.plan_why)}</div>
     ${must?`<div class="planrow"><b>Must render：</b><div class="chips">${must}</div></div>`:''}
     ${distractors?`<div class="planrow"><b>Distractors：</b><div class="chips">${distractors}</div></div>`:''}
     ${r.plan_diversity_tag?`<div class="planrow"><b>Diversity：</b>${esc(r.plan_diversity_tag)}</div>`:''}
   </details>`:''}
   ${r.question?`<div class="q">${esc(r.question)}</div>`:''}
   ${opts?`<div class="opts">${opts}</div>`:''}
   ${r.answer_text?`<div class="ans">答案：${esc(r.answer)} · ${esc(r.answer_text)}</div>`:''}
   ${r.error?`<div class="err">${esc(r.error)}</div>`:''}
  </div>
 </article>`;
}
function render(){
 const q=search.value.toLowerCase();
 const b=branch.value, st=status.value;
 let rows=DATA.filter(r=>(!b||r.branch===b)&&(!st||(st==='ok'?r.ok:!r.ok))&&(`${r.cell} ${r.title} ${r.path} ${r.idea||''} ${r.plan_scene||''} ${r.plan_question||''} ${r.question||''}`.toLowerCase().includes(q)));
 document.getElementById('count').textContent=rows.length;
 grid.innerHTML=rows.map(card).join('');
}
search.oninput=render; branch.onchange=render; status.onchange=render; render();
</script>
