<script>
const grid=document.getElementById('grid');
const search=document.getElementById('search');
const statusEl=document.getElementById('status');
const sampleById=new Map(SAMPLES.map(s=>[s.id,s]));
const marksApi='/api/marks/spec-danti-v6';
const STATIC_HOST=location.hostname.endsWith('github.io')||location.protocol==='file:';
const marksKey='soutu-v6-danti-spec-marks';
let query='';
let mode='all';
let marks=loadLocalMarks();
let serverSamples={};
const modeButtons=[...document.querySelectorAll('.mode button')];
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function loadLocalMarks(){try{const parsed=JSON.parse(localStorage.getItem(marksKey)||'{}');return parsed&&typeof parsed==='object'?parsed:{}}catch{return {}}}
function setStatus(text,bad=false){statusEl.textContent=text;statusEl.dataset.bad=String(!!bad)}
function statLine(s){const st=s.stats||{};return `V${st.vertices||0} E${st.edges||0} F${st.faces||0} aux${st.aux_lines||0} p${st.primitives||0}`}
function matchMode(s){if(mode==='struct')return !!s.hitStruct;if(mode==='keyword')return !!s.hitKeyword;if(mode==='marked')return marks[s.id]==='bad';return true}
function matchQuery(s){const q=query.trim().toLowerCase();return matchMode(s)&&(!q||[s.title,s.meta,s.id,(s.reasons||[]).join(' ')].join(' ').toLowerCase().includes(q))}
function card(s){const m=marks[s.id]||'';const marked=m==='bad';const reason=(s.reasons||[]).map(r=>`<span class="badge">${esc(r)}</span>`).join('');const q=(s.quality?.reasons||[]).join(', ');return `<article class="card${marked?' marked':''}"><div class="head"><div class="title" title="${esc(s.title)}">${String(s.index).padStart(4,'0')} · ${esc(s.title)}</div><div class="stats" title="${esc(q)}">${statLine(s)}</div></div><div class="pair"><div class="pane"><span class="label">原图</span><img loading="lazy" src="${s.original}" alt=""></div><div class="pane"><span class="label">Spec PNG</span><img loading="lazy" src="${s.specImage}?v=r2" alt=""></div></div><div class="foot"><div class="reason">${marked?'<span class="badge mark">你已过滤</span>':''}${reason}</div><div class="marks"><button data-id="${esc(s.id)}" data-mark="keep" data-active="${m==='keep'}">保留</button><button data-id="${esc(s.id)}" data-mark="bad" data-active="${m==='bad'}">过滤</button><button data-id="${esc(s.id)}" data-mark="todo" data-active="${m==='todo'}">待看</button></div></div></article>`}
function render(){modeButtons.forEach(b=>b.dataset.active=String((b.dataset.mode||'all')===mode));const rows=SAMPLES.filter(matchQuery);grid.innerHTML=rows.length?rows.map(card).join(''):'<div class="empty">No samples</div>';for(const b of grid.querySelectorAll('.marks button'))b.addEventListener('click',()=>setMark(b));setStatus(`${rows.length} / ${SAMPLES.length}`)}
function counts(){const out={keep:0,bad:0,todo:0,total:0};for(const mark of Object.values(marks)){if(mark&&out[mark]!==undefined){out[mark]++;out.total++}}return out}
function payload(){const samples={...serverSamples};for(const [id,mark] of Object.entries(marks)){if(!mark)continue;const s=sampleById.get(id);if(s)samples[id]={...(samples[id]||{}),mark,index:s.index,id,title:s.title,meta:s.meta||'',category:'单体',stats:s.stats||{},quality:s.quality||{},original:s.original||'',specImage:s.specImage||'',ruleReasons:s.reasons||[]}}return {slug:'spec-danti-v6',updatedAt:new Date().toISOString(),counts:counts(),marks,samples}}
async function save(){if(STATIC_HOST){setStatus('本地已保存（公网版不回传，点 复制标记码 发给机器人）');return;}try{const res=await fetch(marksApi,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});if(!res.ok)throw new Error(String(res.status));setStatus(`已同步 ${counts().total}`)}catch(e){setStatus('同步失败',true)}}
function setMark(button){const id=button.dataset.id;const mark=button.dataset.mark;if(marks[id]===mark)delete marks[id];else marks[id]=mark;localStorage.setItem(marksKey,JSON.stringify(marks));render();save()}
async function loadServerMarks(){if(STATIC_HOST)return;try{const res=await fetch(marksApi,{cache:'no-store'});if(!res.ok)return;const data=await res.json();serverSamples=data.samples||{};marks={...(data.marks||{}),...marks};localStorage.setItem(marksKey,JSON.stringify(marks));render();setStatus(`已载入 ${counts().total}`)}catch{}}
function exportMarks(){const blob=new Blob([JSON.stringify(payload(),null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`spec-danti-v6-complex-rule-marks-${new Date().toISOString().replace(/[:.]/g,'-')}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
search.addEventListener('input',()=>{query=search.value;render()});
for(const b of modeButtons)b.addEventListener('click',()=>{mode=b.dataset.mode||'all';render()});
document.getElementById('sync').addEventListener('click',save);
document.getElementById('export').addEventListener('click',exportMarks);
render();
loadServerMarks();

const MARKS_PAGE='danti-v6-complex-rule';
function buildMarksCode(){const byId=(typeof sampleById!=='undefined')?sampleById:new Map((typeof SAMPLES!=='undefined'?SAMPLES:[]).map(s=>[s.id,s]));const idx={bad:[],keep:[],todo:[]};for(const [id,mark] of Object.entries(marks)){if(!mark||!idx[mark])continue;const s=byId.get(id);idx[mark].push(s&&Number.isInteger(s.index)?s.index:id)}for(const k of Object.keys(idx))idx[k].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));const payload={v:1,page:MARKS_PAGE,slug:'spec-danti-v6',t:new Date().toISOString(),idx};return 'DANTI1.'+btoa(unescape(encodeURIComponent(JSON.stringify(payload))))}
async function copyMarksCode(){const code=buildMarksCode();let ok=false;try{await navigator.clipboard.writeText(code);ok=true}catch(e){}if(ok){setStatus('标记码已复制，去飞书粘贴发给机器人即可')}else{window.prompt('长按全选复制标记码，发给飞书机器人：',code)}}
document.getElementById('copyMarksCode')&&document.getElementById('copyMarksCode').addEventListener('click',copyMarksCode);
</script>
