<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FloorplanQA 对比分析</title>
<style>
:root{--bg:#0f1115;--card:#171a21;--bd:#262b36;--fg:#e6e9ef;--mut:#9aa3b2;--ok:#36c08a;--bad:#e5616a;--acc:#5b8def;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:20px}
h1{font-size:20px;margin:0 0 4px}
.sub{color:var(--mut);font-size:12px;margin-bottom:16px}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;flex:1;min-width:200px}
.card .big{font-size:26px;font-weight:700}
.card .lbl{color:var(--mut);font-size:12px}
table{border-collapse:collapse;width:100%;background:var(--card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:18px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--bd);font-size:13px}
th{background:#1c212b;color:var(--mut);font-weight:600;position:sticky;top:0}
tr:last-child td{border-bottom:none}
.win{color:var(--ok);font-weight:600}.lose{color:var(--bad);font-weight:600}
.ok{color:var(--ok)}.bad{color:var(--bad)}.mut{color:var(--mut)}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
select,input{background:#1c212b;color:var(--fg);border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:13px}
input[type=text]{min-width:220px}
.chip{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;border:1px solid var(--bd)}
.q-both_correct{color:var(--ok)}.q-both_wrong{color:var(--bad)}.q-a_only{color:#7fb3ff}.q-b_only{color:#f0b86e}
.rowline{cursor:pointer}
.rowline:hover{background:#1c212b}
.detail{background:#10131a;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;white-space:pre-wrap;padding:12px;border-left:3px solid var(--acc)}
.detail h4{margin:8px 0 4px;font-family:inherit;color:var(--mut)}
.pill{font-size:11px;padding:1px 6px;border-radius:6px;background:#1c212b;border:1px solid var(--bd);color:var(--mut)}
.flex{display:flex;gap:18px;flex-wrap:wrap}
.col{flex:1;min-width:320px}
.tag{font-size:11px;color:var(--mut)}
code{background:#1c212b;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
<div class="wrap">
<h1>FloorplanQA 对比分析 · <span id="la"></span> vs <span id="lb"></span></h1>
<div class="sub" id="sub"></div>

<div class="cards" id="cards"></div>

<h3>统一分数表(各模型在自己已预测题上)</h3>
<table id="scoreTable"></table>

<h3>差分四象限(共同可比题)</h3>
<table id="quadTable"></table>

<h3>逐题浏览 / 差分 case</h3>
<div class="controls">
  <label class="tag">Task <select id="fTask"></select></label>
  <label class="tag">象限 <select id="fQuad">
    <option value="">全部</option>
    <option value="a_only">A对/B错</option>
    <option value="b_only">B对/A错</option>
    <option value="both_wrong">都错</option>
    <option value="both_correct">都对</option>
    <option value="partial_missing">单模型缺</option>
  </select></label>
  <input type="text" id="fSearch" placeholder="搜索 question / 答案..."/>
  <span class="tag" id="count"></span>
</div>
<table id="rowTable"></table>
</div>

const A = DATA.labels.a, B = DATA.labels.b;
document.getElementById('la').textContent = A;
document.getElementById('lb').textContent = B;
document.getElementById('sub').textContent =
  `7-task / 504 balanced subset(非官方全量,不可直接对 paper baseline) · 共同可比题 ${DATA.common_count} 条`;

const sa = DATA.summary.a, sb = DATA.summary.b;
const lead = sa.overall >= sb.overall ? A : B;
const q = DATA.quad_overall;
document.getElementById('cards').innerHTML = `
  <div class="card"><div class="lbl">${A}</div><div class="big">${sa.overall}%</div><div class="lbl">n=${sa.count}</div></div>
  <div class="card"><div class="lbl">${B}</div><div class="big">${sb.overall}%</div><div class="lbl">n=${sb.count}</div></div>
  <div class="card"><div class="lbl">总分领先</div><div class="big win">${lead}</div><div class="lbl">Δ ${(sa.overall-sb.overall).toFixed(2)}</div></div>
  <div class="card"><div class="lbl">差分(都对/都错/A独对/B独对)</div><div class="big">${q.both_correct||0}/${q.both_wrong||0}/${q.a_only||0}/${q.b_only||0}</div><div class="lbl">共同 ${DATA.common_count} 条</div></div>
`;

// score table
let st = `<tr><th>Task</th><th>${A}</th><th>${B}</th><th>Δ(A-B)</th></tr>`;
for (const t of DATA.tasks){
  const a = sa.by_task[t]?.acc, b = sb.by_task[t]?.acc;
  const d = (a!=null&&b!=null)?(a-b).toFixed(2):'';
  const cls = d>0?'win':(d<0?'lose':'');
  st += `<tr><td>${t}</td><td>${a??'-'}%</td><td>${b??'-'}%</td><td class="${cls}">${d}</td></tr>`;
}
st += `<tr><td><b>overall</b></td><td><b>${sa.overall}%</b></td><td><b>${sb.overall}%</b></td><td><b>${(sa.overall-sb.overall).toFixed(2)}</b></td></tr>`;
document.getElementById('scoreTable').innerHTML = st;

// quad table
let qt = `<tr><th>Task</th><th>都对</th><th>都错</th><th>${A}对/${B}错</th><th>${B}对/${A}错</th></tr>`;
for (const t of DATA.tasks){
  const x = DATA.quad_by_task[t]||{};
  qt += `<tr><td>${t}</td><td class="ok">${x.both_correct||0}</td><td class="bad">${x.both_wrong||0}</td><td class="q-a_only">${x.a_only||0}</td><td class="q-b_only">${x.b_only||0}</td></tr>`;
}
qt += `<tr><td><b>总计</b></td><td class="ok"><b>${q.both_correct||0}</b></td><td class="bad"><b>${q.both_wrong||0}</b></td><td class="q-a_only"><b>${q.a_only||0}</b></td><td class="q-b_only"><b>${q.b_only||0}</b></td></tr>`;
document.getElementById('quadTable').innerHTML = qt;

// task filter options
const fTask = document.getElementById('fTask');
fTask.innerHTML = `<option value="">全部</option>` + DATA.tasks.map(t=>`<option>${t}</option>`).join('');

function mark(c){ return c===null?'<span class="mut">缺</span>':(c?'<span class="ok">✓</span>':'<span class="bad">✗</span>'); }
function quadChip(qd){
  const m={both_correct:'都对',both_wrong:'都错',a_only:'A独对',b_only:'B独对',partial_missing:'单缺',both_missing:'都缺'};
  return `<span class="chip q-${qd}">${m[qd]||qd}</span>`;
}

const rowTable = document.getElementById('rowTable');
function render(){
  const ft = fTask.value, fq = document.getElementById('fQuad').value;
  const fs = document.getElementById('fSearch').value.trim().toLowerCase();
  let rows = DATA.records.filter(r=>
    (!ft||r.task===ft) && (!fq||r.quad===fq) &&
    (!fs || (r.question||'').toLowerCase().includes(fs) || String(r.gold||'').toLowerCase().includes(fs)
        || String(r.a_final||'').toLowerCase().includes(fs) || String(r.b_final||'').toLowerCase().includes(fs))
  );
  document.getElementById('count').textContent = `${rows.length} 条`;
  let h = `<tr><th>#</th><th>task</th><th>room</th><th>gold</th><th>${A}</th><th></th><th>${B}</th><th></th><th>象限</th></tr>`;
  for (const r of rows){
    h += `<tr class="rowline" data-i="${r.index}">
      <td>${r.index}</td><td>${r.task}</td><td class="mut">${r.room_type||''}</td>
      <td><code>${esc(r.gold)}</code></td>
      <td>${esc(trunc(r.a_final,28))}</td><td>${mark(r.a_correct)}</td>
      <td>${esc(trunc(r.b_final,28))}</td><td>${mark(r.b_correct)}</td>
      <td>${quadChip(r.quad)}</td></tr>`;
  }
  rowTable.innerHTML = h;
  rowTable.querySelectorAll('.rowline').forEach(tr=>{
    tr.onclick = ()=>toggle(tr, +tr.dataset.i);
  });
}
function trunc(s,n){ s=s==null?'':String(s); return s.length>n?s.slice(0,n)+'…':s; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
let DETAILS = null, DETAILS_LOADING = null;
async function loadDetails(){
  if (DETAILS) return DETAILS;
  if (!DETAILS_LOADING) DETAILS_LOADING = fetch('details.json').then(r=>r.json()).then(j=>{DETAILS=j; return j;});
  return DETAILS_LOADING;
}
async function toggle(tr, idx){
  const nx = tr.nextElementSibling;
  if (nx && nx.classList.contains('detailRow')){ nx.remove(); return; }
  const r = DATA.records.find(x=>x.index===idx);
  const td = document.createElement('tr'); td.className='detailRow';
  td.innerHTML = `<td colspan="9"><div class="detail">加载详情中…</div></td>`;
  tr.after(td);
  const d = (await loadDetails())[String(idx)] || {};
  td.innerHTML = `<td colspan="9"><div class="detail">
<h4>QUESTION</h4>${esc(d.question)}
<div class="flex" style="margin-top:8px">
<div class="col"><h4>${A} ${mark(r.a_correct)} (parsed: ${esc(d.a_parsed)})</h4>${esc(d.a_full)||'<span class=mut>无</span>'}</div>
<div class="col"><h4>${B} ${mark(r.b_correct)} (parsed: ${esc(d.b_parsed)})</h4>${esc(d.b_full)||'<span class=mut>无</span>'}</div>
</div>
<h4>GOLD</h4>${esc(r.gold)}
</div></td>`;
}
fTask.onchange = render;
document.getElementById('fQuad').onchange = render;
document.getElementById('fSearch').oninput = render;
render();
