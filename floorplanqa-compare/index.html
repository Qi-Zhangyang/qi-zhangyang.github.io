document.getElementById('cards').innerHTML=labels.map((l,i)=>`<div class="card"><div class="rank">#${i+1}</div><div class="model">${esc(l)}</div><div class="score ${i==0?'lead':''}">${DATA.summary[l].overall}%</div><div class="mut">n=${DATA.summary[l].count}</div></div>`).join('');
let score='<tr><th>Task</th>'+labels.map(l=>`<th class="num">${esc(l)}</th>`).join('')+'</tr>';
for(const t of DATA.tasks){score+=`<tr><td>${esc(t)}</td>`+labels.map(l=>`<td class="num">${DATA.summary[l].by_task[t].acc}%</td>`).join('')+'</tr>'}
score+=`<tr><td><b>overall</b></td>`+labels.map(l=>`<td class="num"><b>${DATA.summary[l].overall}%</b></td>`).join('')+'</tr>';
document.getElementById('score').innerHTML=score;
let pw='<tr><th>A vs B</th><th class="num">A独对</th><th class="num">B独对</th><th class="num">都对</th><th class="num">都错</th></tr>';
for(let i=0;i<labels.length;i++){for(let j=i+1;j<labels.length;j++){const a=labels[i],b=labels[j],x=DATA.pairwise[`${a}__vs__${b}`];pw+=`<tr><td>${esc(a)} vs ${esc(b)}</td><td class="num good">${x.a_only}</td><td class="num">${x.b_only}</td><td class="num">${x.both_correct}</td><td class="num bad">${x.both_wrong}</td></tr>`}}
document.getElementById('pairwise').innerHTML=pw;
document.getElementById('task').innerHTML='<option value="">全部</option>'+DATA.tasks.map(t=>`<option>${esc(t)}</option>`).join('');
function corrType(r){const vals=labels.map(l=>r.models[l].correct);if(vals.every(Boolean))return'all_correct';if(vals.every(v=>!v))return'all_wrong';return'mixed'}
let DETAILS=null;async function details(){if(!DETAILS)DETAILS=await fetch('details.json').then(r=>r.json());return DETAILS}
function render(){const ft=task.value,fc=corr.value,fs=search.value.toLowerCase().trim();let rs=DATA.records.filter(r=>(!ft||r.task===ft)&&(!fc||corrType(r)===fc)&&(!fs||String(r.index).includes(fs)||String(r.gold).toLowerCase().includes(fs)||labels.some(l=>String(r.models[l].final).toLowerCase().includes(fs))));count.textContent=`${rs.length} / ${DATA.records.length}`;let h='<tr><th>#</th><th>Task</th><th>Gold</th>'+labels.map(l=>`<th>${esc(l)}</th>`).join('')+'<th>Bucket</th></tr>';for(const r of rs){h+=`<tr class="row" data-i="${r.index}"><td>${r.index}</td><td>${esc(r.task)}</td><td class="mono">${esc(r.gold)}</td>`+labels.map(l=>`<td>${mark(r.models[l].correct)} <span class="mono">${esc(trunc(r.models[l].final,36))}</span></td>`).join('')+`<td><span class="pill">${corrType(r)}</span></td></tr>`}rows.innerHTML=h;rows.querySelectorAll('.row').forEach(tr=>tr.onclick=()=>toggle(tr,+tr.dataset.i))}
async function toggle(tr,idx){const nx=tr.nextElementSibling;if(nx&&nx.classList.contains('detailRow')){nx.remove();return}const d=(await details())[idx];const r=DATA.records.find(x=>x.index===idx);const el=document.createElement('tr');el.className='detailRow';el.innerHTML=`<td colspan="${4+labels.length}"><div class="detail"><b>QUESTION</b>\n${esc(d.question)}\n\n<b>GOLD</b>\n${esc(d.gold)}\n\n<div class="grid">`+labels.map(l=>`<div class="box"><h4>${esc(l)} ${mark(r.models[l].correct)} parsed=${esc(d.models[l].parsed)}</h4>${esc(d.models[l].final)}</div>`).join('')+`</div></div></td>`;tr.after(el)}
task.onchange=render;corr.onchange=render;search.oninput=render;render();
</script></body></html>
